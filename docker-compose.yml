services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/dev.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${CLERK_PUB}
      - CLERK_SECRET_KEY=${CLERK_SECRET}
      - LEMONSQUEEZY_WEBHOOK_SECRET=${LS_WEBHOOK_SECRET}
    volumes:
      - ./data:/data
